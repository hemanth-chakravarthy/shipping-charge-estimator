spring:
  web:
    resources:
      add-mappings: true
  mvc:
    favicon:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/shippingdb
    driver-class-name: org.postgresql.Driver
    username: admin
    password: secret
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  cache:
    type: simple

server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
